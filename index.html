<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot ROFEX - Trade Journal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; padding: 15px; }
h1 { color: #fff; margin-bottom: 5px; font-size: 22px; }
h2 { color: #7eb8f7; margin: 22px 0 10px; border-bottom: 1px solid #2a2d3a; padding-bottom: 6px; font-size: 16px; }
.subtitle { color: #888; margin-bottom: 18px; font-size: 13px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 12px 0; }
.card { background: #1a1d2e; border-radius: 8px; padding: 14px; border: 1px solid #2a2d3a; }
.card .label { color: #888; font-size: 11px; text-transform: uppercase; }
.card .value { font-size: 22px; font-weight: bold; margin-top: 3px; }
.green { color: #4caf50; } .red { color: #f44336; } .blue { color: #7eb8f7; } .gold { color: #ffd700; } .orange { color: #ff9800; }
table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 12px; }
th { background: #1e2233; color: #7eb8f7; text-align: left; padding: 8px; position: sticky; top: 0; font-size: 11px; }
td { padding: 6px 8px; border-bottom: 1px solid #1e2233; }
tr:hover { background: #1a1d2e; }
.badge { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: bold; }
.badge-zscore { background: #1a3a2a; color: #4caf50; }
.badge-calendar { background: #1a2a3a; color: #7eb8f7; }
.badge-oi { background: #3a2a1a; color: #ff9800; }
.badge-vol { background: #3a1a3a; color: #e040fb; }
.badge-fuerte { background: #2d1f1f; color: #ff6b6b; }
.badge-moderada { background: #2d2a1f; color: #ffd700; }
select.estado { padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; border: 1px solid #2a2d3a; }
.estado-PENDIENTE { background: #2a2d3a; color: #aaa; }
.estado-EJECUTADO { background: #1a3a2a; color: #4caf50; }
.estado-IGNORADO { background: #2a2d3a; color: #666; }
.estado-CERRADO_TP { background: #1a3a1a; color: #4caf50; }
.estado-CERRADO_SL { background: #3a1a1a; color: #f44336; }
.estado-CERRADO_MANUAL { background: #1a2a3a; color: #7eb8f7; }
input.edit { background: #1a1d2e; border: 1px solid #2a2d3a; color: #e0e0e0; padding: 3px 6px; border-radius: 4px; width: 80px; font-size: 11px; }
input.edit:focus { border-color: #7eb8f7; outline: none; }
textarea.notes { background: #1a1d2e; border: 1px solid #2a2d3a; color: #e0e0e0; padding: 3px 6px; border-radius: 4px; width: 120px; height: 28px; font-size: 11px; resize: vertical; }
.btn { padding: 7px 14px; border-radius: 5px; cursor: pointer; font-size: 12px; margin: 3px; border: none; }
.btn-primary { background: #7eb8f7; color: #0f1117; font-weight: bold; }
.btn-secondary { background: #2a2d3a; color: #7eb8f7; border: 1px solid #7eb8f7; }
.btn:hover { opacity: 0.85; }
.filter-bar { display: flex; gap: 6px; margin: 10px 0; flex-wrap: wrap; }
.filter-btn { padding: 5px 12px; border-radius: 5px; border: 1px solid #2a2d3a; background: #1a1d2e; color: #e0e0e0; cursor: pointer; font-size: 11px; }
.filter-btn:hover, .filter-btn.active { background: #2a3050; border-color: #7eb8f7; color: #7eb8f7; }
.motivo { max-width: 220px; font-size: 10px; color: #888; }
.empty { text-align: center; padding: 60px 20px; color: #555; }
.empty h3 { color: #7eb8f7; margin-bottom: 10px; }
.bar-chart { display: flex; align-items: flex-end; height: 120px; gap: 2px; margin: 8px 0; }
.bar { min-width: 6px; flex: 1; border-radius: 2px 2px 0 0; position: relative; }
.bar.pos { background: #4caf50; } .bar.neg { background: #f44336; }
.bar:hover .tip { display: block; }
.tip { display: none; position: absolute; background: #2a2d3a; color: #fff; padding: 5px 8px; border-radius: 4px; font-size: 10px; z-index: 10; white-space: nowrap; bottom: 100%; left: 50%; transform: translateX(-50%); }
</style>
</head>
<body>
<h1>Trade Journal - Bot ROFEX</h1>
<p class="subtitle">Ultima actualizacion: <span id="upd"></span> | Editable - cambios se guardan en tu browser</p>
<div class="grid" id="stats"></div>
<div id="chart-section"></div>
<h2>Trades</h2>
<div class="filter-bar" id="filters"></div>
<div>
  <button class="btn btn-secondary" onclick="exportCSV()">Exportar CSV</button>
  <button class="btn btn-secondary" onclick="saveBackup()">Backup JSON</button>
</div>
<div style="overflow-x:auto;margin-top:8px;">
<table>
<thead><tr>
<th>#</th><th>Fecha</th><th>Ticker</th><th>Estrategia</th><th>Fuerza</th>
<th>Entrada</th><th>SL</th><th>TP</th><th>+TP</th><th>-SL</th>
<th>Estado</th><th>Entrada Real</th><th>Salida Real</th><th>P&L Real</th><th>Notas</th><th>Motivo</th>
</tr></thead>
<tbody id="tb"></tbody>
</table>
</div>
<h2>Performance Real</h2>
<div class="grid" id="rstats"></div>

<script>
// === TRADES DATA (auto-updated by bot) ===
let TRADES = __TRADES_DATA__;
// === END TRADES DATA ===

const SN = {'z-score':'Z-Score','calendar-spread':'Calendar','oi-divergence':'OI Div','vol-spike':'Vol Spike','macro-brecha':'Brecha','macro-reservas':'Reservas'};
const SB = {'z-score':'badge-zscore','calendar-spread':'badge-calendar','oi-divergence':'badge-oi','vol-spike':'badge-vol'};

// Load edits from localStorage
const lk = 'rofex_journal_v2';
try { const e=JSON.parse(localStorage.getItem(lk)||'{}'); TRADES.forEach(t=>{if(e[t.id])Object.assign(t,e[t.id]);}); } catch(x){}

function render(f) {
  document.getElementById('upd').textContent = new Date().toLocaleString('es-AR');
  const ft = f&&f!=='all' ? TRADES.filter(t=>t.estado===f||t.estrategia===f) : TRADES;

  if (!TRADES.length) {
    document.getElementById('stats').innerHTML = '';
    document.getElementById('tb').innerHTML = '<tr><td colspan="16" class="empty"><h3>Sin trades todavia</h3><p>El bot enviara senales cuando detecte oportunidades.</p></td></tr>';
    return;
  }

  const tot=TRADES.length, tp=TRADES.filter(t=>t.estado==='CERRADO_TP').length, sl=TRADES.filter(t=>t.estado==='CERRADO_SL').length;
  const pend=TRADES.filter(t=>t.estado==='PENDIENTE').length, ej=TRADES.filter(t=>t.estado==='EJECUTADO').length;
  const ig=TRADES.filter(t=>t.estado==='IGNORADO').length;
  const pr=TRADES.filter(t=>t.pnl_real!=null).reduce((s,t)=>s+(t.pnl_real||0),0);

  document.getElementById('stats').innerHTML = `
    <div class="card"><div class="label">Senales</div><div class="value blue">${tot}</div></div>
    <div class="card"><div class="label">Pendientes</div><div class="value orange">${pend}</div></div>
    <div class="card"><div class="label">Ejecutados</div><div class="value green">${ej}</div></div>
    <div class="card"><div class="label">TP</div><div class="value green">${tp}</div></div>
    <div class="card"><div class="label">SL</div><div class="value red">${sl}</div></div>
    <div class="card"><div class="label">Ignorados</div><div class="value">${ig}</div></div>
    <div class="card"><div class="label">P&L Real</div><div class="value ${pr>=0?'green':'red'}">$${pr.toLocaleString('es-AR')}</div></div>`;

  // Chart
  const rt=TRADES.filter(t=>t.pnl_real!=null);
  if(rt.length>1){
    const mx=Math.max(...rt.map(t=>Math.abs(t.pnl_real)));
    document.getElementById('chart-section').innerHTML = `<h2>P&L por Trade</h2><div style="background:#1a1d2e;border-radius:8px;border:1px solid #2a2d3a;padding:12px;"><div class="bar-chart">${rt.map(t=>{
      const h=Math.max(4,Math.abs(t.pnl_real)/mx*100);
      return `<div class="bar ${t.pnl_real>=0?'pos':'neg'}" style="height:${h}px"><div class="tip">${t.ticker}<br>$${t.pnl_real.toLocaleString('es-AR')}</div></div>`;
    }).join('')}</div></div>`;
  }

  // Filters
  const es=[...new Set(TRADES.map(t=>t.estado))], st=[...new Set(TRADES.map(t=>t.estrategia).filter(Boolean))];
  document.getElementById('filters').innerHTML = `
    <button class="filter-btn ${!f||f==='all'?'active':''}" onclick="render('all')">Todos (${tot})</button>
    ${es.map(e=>`<button class="filter-btn ${f===e?'active':''}" onclick="render('${e}')">${e.replace('_',' ')} (${TRADES.filter(t=>t.estado===e).length})</button>`).join('')}
    ${st.map(s=>`<button class="filter-btn ${f===s?'active':''}" onclick="render('${s}')">${SN[s]||s} (${TRADES.filter(t=>t.estrategia===s).length})</button>`).join('')}`;

  // Table
  document.getElementById('tb').innerHTML = ft.slice().reverse().map(t=>`<tr>
    <td>${t.id}</td><td style="white-space:nowrap">${t.fecha}</td><td><b>${t.ticker}</b></td>
    <td><span class="badge ${SB[t.estrategia]||''}">${SN[t.estrategia]||t.estrategia||''}</span></td>
    <td><span class="badge badge-${t.fuerza.toLowerCase()}">${t.fuerza}</span></td>
    <td>$${t.entrada?.toLocaleString('es-AR')||'-'}</td>
    <td>$${t.stop_loss?.toLocaleString('es-AR')||'-'}</td>
    <td>$${t.take_profit?.toLocaleString('es-AR')||'-'}</td>
    <td class="green">+$${(t.pnl_tp||0).toLocaleString('es-AR')}</td>
    <td class="red">-$${(t.pnl_sl||0).toLocaleString('es-AR')}</td>
    <td><select class="estado estado-${t.estado}" onchange="upd(${t.id},'estado',this.value);this.className='estado estado-'+this.value">
      ${['PENDIENTE','EJECUTADO','IGNORADO','CERRADO_TP','CERRADO_SL','CERRADO_MANUAL'].map(e=>`<option value="${e}" ${t.estado===e?'selected':''}>${e.replace('_',' ')}</option>`).join('')}
    </select></td>
    <td><input class="edit" type="number" step="0.01" value="${t.precio_real_entrada||''}" placeholder="$..." onchange="upd(${t.id},'precio_real_entrada',+this.value);calc(${t.id})"></td>
    <td><input class="edit" type="number" step="0.01" value="${t.precio_real_salida||''}" placeholder="$..." onchange="upd(${t.id},'precio_real_salida',+this.value);calc(${t.id})"></td>
    <td class="${(t.pnl_real||0)>=0?'green':'red'}">${t.pnl_real!=null?'$'+t.pnl_real.toLocaleString('es-AR'):'-'}</td>
    <td><textarea class="notes" onchange="upd(${t.id},'notas',this.value)">${t.notas||''}</textarea></td>
    <td class="motivo">${t.motivo||''}</td>
  </tr>`).join('');

  // Real stats
  if(rt.length){
    const rw=rt.filter(t=>t.pnl_real>0).length, wr=(rw/rt.length*100).toFixed(1);
    const rp=rt.reduce((s,t)=>s+t.pnl_real,0), ra=Math.round(rp/rt.length);
    document.getElementById('rstats').innerHTML = `
      <div class="card"><div class="label">Trades Cerrados</div><div class="value blue">${rt.length}</div></div>
      <div class="card"><div class="label">Win Rate Real</div><div class="value ${rw/rt.length>=0.5?'green':'red'}">${wr}%</div></div>
      <div class="card"><div class="label">P&L Total</div><div class="value ${rp>=0?'green':'red'}">$${rp.toLocaleString('es-AR')}</div></div>
      <div class="card"><div class="label">P&L Promedio</div><div class="value ${ra>=0?'green':'red'}">$${ra.toLocaleString('es-AR')}</div></div>`;
  } else {
    document.getElementById('rstats').innerHTML='<p style="color:#666;font-size:13px">Completa precio real de entrada y salida en los trades para ver tu performance real.</p>';
  }
}

function upd(id,k,v){const t=TRADES.find(x=>x.id===id);if(t){t[k]=v;sav();}}
function calc(id){const t=TRADES.find(x=>x.id===id);if(t&&t.precio_real_entrada&&t.precio_real_salida){t.pnl_real=Math.round((t.tipo==='VENTA'?t.precio_real_entrada-t.precio_real_salida:t.precio_real_salida-t.precio_real_entrada)*1000*(t.contratos||1));sav();render();}}
function sav(){const e={};TRADES.forEach(t=>{e[t.id]={estado:t.estado,precio_real_entrada:t.precio_real_entrada,precio_real_salida:t.precio_real_salida,pnl_real:t.pnl_real,notas:t.notas};});localStorage.setItem(lk,JSON.stringify(e));}
function exportCSV(){const h='ID,Fecha,Ticker,Estrategia,Fuerza,Entrada,SL,TP,Estado,Entrada Real,Salida Real,PnL Real,Notas';const r=TRADES.map(t=>[t.id,t.fecha,t.ticker,t.estrategia,t.fuerza,t.entrada,t.stop_loss,t.take_profit,t.estado,t.precio_real_entrada||'',t.precio_real_salida||'',t.pnl_real||'','"'+(t.notas||'')+'"'].join(','));const c=[h,...r].join('\n');const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='rofex_'+new Date().toISOString().split('T')[0]+'.csv';a.click();}
function saveBackup(){const b=new Blob([JSON.stringify(TRADES,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='trades_backup.json';a.click();}

render();
</script>
</body>
</html>
